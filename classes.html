<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уроки - SLV English</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="classes-header">
        <a href="index.html"><img src="https://cdn.sanriowiki.com/2/23/Cinnamoroll.png" alt="Cinnamoroll"></a>
        <nav>
            <ul>
                <li><a href="classes.html">Уроки</a></li>
                <li><a href="myprogress.html">Мій прогрес</a></li>
                <li><a href="practice.html">Практика</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="practice-section">

            <div class="filter-section">
                <div class="filter-item">
                    <label for="search">Пошук</label>
                    <input type="text" id="search" placeholder="Введіть назву курсу">
                </div>
                <div class="filter-item">
                    <label for="SortPrice">Сортування за ціною</label>
                    <select id="SortPrice">
                        <option value="Без">Без сортувань</option>
                        <option value="менше<більше">Від дешевого до дорогого</option>
                        <option value="більше>менше">Від дорогого до дешевого</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="SortBadge">Рівень</label>
                    <select id="SortBadge">
                        <option value="">Всі рівні</option>
                        <option value="A0">A0</option>
                        <option value="A1">A1</option>
                        <option value="A2">A2</option>
                        <option value="B1">B1</option>
                        <option value="B2">B2</option>
                        <option value="C1">C1</option>
                    </select>
                </div>
                <button id="resetBtn" class="reset-btn">Скинути фільтри</button>
            </div>

            <h2>Курси англійської</h2>
            <div class="lessons-grid" id="en-grid">
            </div>

            <div class="no-results">Нічого не знайдено</div>

        </section>

        <section class="practice-section">
            <br><br>
            <h2>Курси французької</h2>
            <div class="lessons-grid" id="fr-grid">
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-left">
                <h3>SLV Languages</h3>
                <p>Курси іноземних мов онлайн та офлайн у Львові</p>
            </div>
            <div class="footer-center">
                <p>вул. Ірини Калинець, 9</p>
                <p>+38 (096) 797 8991</p>
                <p>✉ info@slv.com</p>
            </div>
            <div class="footer-right">
                <p>© 2026 SLV</p>
            </div>
        </div>
    </footer>

    <script src="comands.js"></script>
    <script src="animation.js"></script>
</body>
</html>
